<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | Minecraft Web</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/Common.css">
    <link rel="stylesheet" href="/css/Login.css">
</head>
<body>

    <div id="BackgroundContainer"></div>

    <div class="LoginContainer">
        <h2>Вход в Аккаунт</h2>

        <form id="LoginForm">
            <div class="InputGroup">
                <label for="Username">Имя пользователя</label>
                <input type="text" id="Username" name="username" required placeholder="Steve" autocomplete="username">
            </div>

            <div class="InputGroup">
                <label for="Password">Пароль</label>
                <input type="password" id="Password" name="password" required placeholder="••••••••" autocomplete="current-password">
            </div>

            <button type="submit" class="BtnMinecraft" id="LoginBtn">Войти</button>
            <div class="Loading" id="Loading"></div>
            <div class="ErrorMessage" id="ErrorMessage"></div>
            <div class="SuccessMessage" id="SuccessMessage"></div>
        </form>

        <div class="FooterLinks">
            <a href="/register">Регистрация</a> • <a href="/forgot">Забыли пароль?</a>
        </div>
    </div>

    <div class="SessionToast" id="SessionToast"></div>

    <script src="/scripts/Login.js"></script>
</body>
</html>
