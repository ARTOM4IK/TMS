<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация | Minecraft Web</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/Common.css">
    <link rel="stylesheet" href="/css/Register.css">
</head>
<body>

    <div id="BackgroundContainer"></div>

    <div class="RegisterContainer">
        <h2>Создание Аккаунта</h2>

        <form id="RegisterForm">
            <div class="InputGroup">
                <label for="RegUsername">Имя пользователя</label>
                <input type="text" id="RegUsername" name="username" required placeholder="Steve" autocomplete="username">
            </div>

            <div class="InputGroup">
                <label for="RegEmail">Email</label>
                <input type="email" id="RegEmail" name="email" required placeholder="steve@minecraft.com">
            </div>

            <div class="InputGroup">
                <label for="RegPassword">Пароль</label>
                <input type="password" id="RegPassword" name="password" required placeholder="••••••••">
            </div>

            <div class="InputGroup">
                <label for="RegConfirmPassword">Повторите пароль</label>
                <input type="password" id="RegConfirmPassword" name="confirmPassword" required placeholder="••••••••">
            </div>

            <button type="submit" class="BtnMinecraft" id="RegisterBtn">Зарегистрироваться</button>
            <div class="Loading" id="Loading"></div>
            <div class="ErrorMessage" id="ErrorMessage"></div>
            <div class="SuccessMessage" id="SuccessMessage"></div>
        </form>

        <div class="FooterLinks">
            <a href="/">Войти</a> • <a href="/forgot">Забыли пароль?</a>
        </div>
    </div>

    <script src="/scripts/Register.js"></script>
</body>
</html>
