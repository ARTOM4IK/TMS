<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Меню | Minecraft Web</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/Common.css">
    <link rel="stylesheet" href="/css/Menu.css">
</head>
<body>
    <div id="BackgroundContainer"></div>

    <div class="UserPanel" id="UserPanel">
        <div class="UserIcon" id="UserIcon"></div>
        <div class="UserName" id="UserNameDisplay"></div>
    </div>

    <div class="MenuContainer">
        <div class="MenuHeader">
            <h2>Выбор Мира</h2>
        </div>

        <button class="BtnDeleteAll BtnMinecraft" id="DeleteAllBtn">УДАЛИТЬ ВСЕ МИРЫ</button>
        <div class="WorldsList" id="WorldsList"></div>

        <div class="MenuActions">
            <button class="BtnCreate BtnMinecraft" id="CreateWorldBtn">Создать мир</button>
            <button class="BtnJoinId BtnMinecraft" id="JoinByIdBtn">По ID</button>
            <button class="BtnJoin BtnMinecraft" id="JoinBtn" disabled>Подключиться</button>
            <button class="BtnExit BtnMinecraft" id="ExitBtn">Выход</button>
        </div>
    </div>

    <div class="ModalOverlay" id="JoinByIdOverlay">
        <div class="ModalBox">
            <h3>Подключение по ID мира</h3>
            <input type="text" id="JoinByIdInput" inputmode="numeric" pattern="[0-9]*" placeholder="1234567890" maxlength="20" autocomplete="off">
            <div class="ModalActions">
                <button type="button" class="BtnMinecraft" id="JoinByIdConfirmBtn">Подключиться</button>
                <button type="button" class="BtnMinecraft" id="JoinByIdCancelBtn">Отмена</button>
            </div>
            <div class="ModalError" id="JoinByIdError"></div>
        </div>
    </div>

    <div id="AdminConsole">
        <div id="ConsoleOutput"></div>
        <input id="ConsoleInput" type="text" placeholder="ban &lt;username&gt; | unban &lt;username&gt;" autocomplete="off">
    </div>

    <div class="SessionToast" id="SessionToast"></div>

    <script src="/scripts/Menu.js"></script>
</body>
</html>
