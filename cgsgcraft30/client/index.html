<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Minecraft Web</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            cursor: none;
            font-family: monospace;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: block;
        }

        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: red;
            pointer-events: none;
            z-index: 9999;
        }

        #fps, #position, #online, #role {
            position: fixed;
            top: 10px;
            color: #0f0;
            font-size: 16px;
            z-index: 1000;
        }

        #fps { left: 10px; }
        #position { left: 90px; }
        #online { left: 320px; color: #ff0; }
        #role { left: 520px; color: #f55; }

        #hotbar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 0;
            padding: 4px;
            background: rgba(0, 0, 0, 0.55);
            border: 2px solid #222;
            z-index: 1000;
        }

        .mc-slot {
            position: relative;
            width: 40px;
            height: 40px;
            margin: 1px;
            background: #8b8b8b;
            border: 2px solid;
            border-color: #373737 #fff #fff #373737;
            box-sizing: border-box;
        }

        .mc-slot.selected {
            border-color: #fff #373737 #373737 #fff;
            box-shadow: inset 0 0 0 1px #fff;
        }

        .mc-slot-icon {
            position: absolute;
            inset: 4px;
            border-radius: 2px;
            opacity: 0;
            pointer-events: none;
        }

        .mc-slot-count {
            position: absolute;
            right: 2px;
            bottom: 0;
            color: #fff;
            font-size: 11px;
            font-weight: bold;
            text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
            pointer-events: none;
        }

        #inventoryPanel {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            pointer-events: none;
            align-items: center;
            justify-content: center;
        }

        #inventoryPanel.open {
            display: flex;
        }

        #inventoryWindow {
            background: rgba(0, 0, 0, 0.65);
            border: 2px solid #555;
            padding: 12px 16px 8px;
            pointer-events: auto;
        }

        .inv-title {
            color: #ccc;
            font-size: 13px;
            margin-bottom: 8px;
            text-align: center;
        }

        #inventoryMain {
            display: grid;
            grid-template-columns: repeat(9, 40px);
            grid-template-rows: repeat(3, 40px);
            gap: 0;
            padding: 4px;
            background: rgba(0, 0, 0, 0.55);
            border: 2px solid #222;
        }

        #loadingOverlay {
            position: fixed;
            inset: 0;
            background: #111;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
        }

        #loadingOverlay.hidden { display: none; }

        #loadingBarWrap {
            width: 320px;
            height: 12px;
            margin-top: 16px;
            background: #333;
            border: 1px solid #555;
        }

        #loadingBar {
            height: 100%;
            width: 0%;
            background: #4caf50;
            transition: width 0.15s ease;
        }

        #chatConsole {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40%;
            background: rgba(0, 0, 0, 0.82);
            z-index: 3000;
            flex-direction: column;
            padding: 10px;
            box-sizing: border-box;
        }

        #chatConsole.open { display: flex; }

        #chatLog {
            flex: 1;
            overflow-y: auto;
            color: #ddd;
            font-size: 14px;
            margin-bottom: 8px;
        }

        #chatInput {
            width: 100%;
            padding: 8px;
            background: #111;
            border: 1px solid #444;
            color: #0f0;
            font-family: monospace;
            font-size: 14px;
            box-sizing: border-box;
        }

        .chat-line.self { color: #8f8; }
        .chat-line.system { color: #ff8; }
        .chat-line.cmd { color: #8cf; }
        .chat-line.error { color: #f66; }

        #playerList {
            display: none;
            position: fixed;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            min-width: 220px;
            background: rgba(0, 0, 0, 0.75);
            border: 2px solid #666;
            padding: 12px;
            z-index: 2500;
            color: #fff;
        }

        #playerList.open { display: block; }

        #playerList h3 {
            margin: 0 0 8px;
            font-size: 14px;
            color: #aaa;
        }

        .player-list-item {
            padding: 4px 0;
            border-bottom: 1px solid #333;
        }
    </style>
</head>

<body>
    <canvas id="gpuCanvas"></canvas>
    <div id="fps">FPS: 0</div>
    <div id="crosshair">+</div>
    <div id="position">Pos: </div>
    <div id="online">P2P: 0</div>
    <div id="role">Игрок</div>

    <div id="loadingOverlay">
        <div id="loadingText">Загрузка мира...</div>
        <div id="loadingBarWrap"><div id="loadingBar"></div></div>
    </div>

    <div id="hotbar"></div>
    <div id="inventoryPanel">
        <div id="inventoryWindow">
            <div class="inv-title">Инвентарь</div>
            <div id="inventoryMain"></div>
        </div>
    </div>

    <div id="chatConsole">
        <div id="chatLog"></div>
        <input id="chatInput" type="text" placeholder="Чат или /команда..." autocomplete="off" />
    </div>

    <div id="playerList">
        <h3>Игроки онлайн</h3>
        <div id="playerListNames"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="./src/main.js"></script>
</body>

</html>
