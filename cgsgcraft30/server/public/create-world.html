<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создание Мира | Minecraft Web</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/Common.css">
    <link rel="stylesheet" href="/css/CreateWorld.css">
</head>
<body>
    <div id="BackgroundContainer"></div>

    <div class="CreateContainer">
        <h2>Создание Мира</h2>

        <form id="CreateWorldForm">
            <div class="InputGroup">
                <label for="WorldName">Название Мира</label>
                <input type="text" id="WorldName" name="worldName" required placeholder="Например: Мой Мир" maxlength="30">
            </div>

            <div class="InputGroup">
                <label for="Seed">Сид (Seed)</label>
                <div class="CheckboxGroup">
                    <input type="checkbox" id="RandomSeed" name="randomSeed">
                    <label for="RandomSeed">Рандомный сид</label>
                </div>
                <input type="text" id="Seed" name="seed" placeholder="12345" class="SeedOffset">
            </div>

            <div class="InputGroup">
                <label for="WorldType">Тип мира</label>
                <select id="WorldType" name="worldType">
                    <option value="default">Обычный</option>
                    <option value="flat">Плоский</option>
                    <option value="large_biomes">Большие биомы</option>
                    <option value="amplified">Усиленный</option>
                </select>
            </div>

            <button type="submit" class="BtnMinecraft" id="CreateBtn">Создать мир</button>
            <div class="Loading" id="Loading"></div>
            <div class="ErrorMessage" id="ErrorMessage"></div>
            <div class="SuccessMessage" id="SuccessMessage"></div>
        </form>

        <button class="BtnBack" id="BackBtn">Назад в меню</button>
    </div>

    <script src="/scripts/CreateWorld.js"></script>
</body>
</html>
