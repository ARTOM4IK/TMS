<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сброс Пароля | Minecraft Web</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/Common.css">
    <link rel="stylesheet" href="/css/Forgot.css">
</head>
<body>

    <div id="BackgroundContainer"></div>

    <div class="ForgotContainer">
        <h2>Сброс Пароля</h2>

        <div id="Step1">
            <form id="ForgotForm">
                <div class="InputGroup">
                    <label for="ForgotEmail">Ваш Email</label>
                    <input type="email" id="ForgotEmail" name="email" required placeholder="steve@minecraft.com">
                </div>

                <button type="submit" class="BtnMinecraft" id="ForgotBtn">Отправить код</button>
                <div class="Loading" id="Loading"></div>
                <div class="ErrorMessage" id="ErrorMessage"></div>
                <div class="SuccessMessage" id="SuccessMessage"></div>
            </form>

            <div class="FooterLinks">
                <a href="/">Войти</a> • <a href="/register">Регистрация</a>
            </div>
        </div>

        <div id="Step2" class="Hidden">
            <form id="VerifyForm">
                <div class="InputGroup">
                    <label for="VerifyCode">Код подтверждения</label>
                    <input type="text" id="VerifyCode" name="code" required placeholder="123456">
                </div>

                <button type="submit" class="BtnMinecraft" id="VerifyBtn">Проверить код</button>
                <div class="Loading" id="Loading2"></div>
                <div class="ErrorMessage" id="VerifyErrorMessage"></div>
                <div class="SuccessMessage" id="VerifySuccessMessage"></div>
            </form>
        </div>

        <div id="Step3" class="Hidden">
            <form id="ResetForm">
                <div class="InputGroup">
                    <label for="NewPassword">Новый пароль</label>
                    <input type="password" id="NewPassword" name="password" required placeholder="••••••••">
                </div>

                <div class="InputGroup">
                    <label for="ConfirmNewPassword">Повторите пароль</label>
                    <input type="password" id="ConfirmNewPassword" name="confirmPassword" required placeholder="••••••••">
                </div>

                <button type="submit" class="BtnMinecraft" id="ResetBtn">Сменить пароль</button>
                <div class="Loading" id="Loading3"></div>
                <div class="ErrorMessage" id="ResetErrorMessage"></div>
                <div class="SuccessMessage" id="ResetSuccessMessage"></div>
            </form>
        </div>

        <div id="Step4" class="Hidden">
            <div class="SuccessMessage StepSuccess">
                Пароль успешно изменен!
            </div>
            <a href="/" class="BtnMinecraft">Войти</a>
        </div>
    </div>

    <script src="/scripts/Forgot.js"></script>
</body>
</html>
